<mat-card
  appearance="outlined"
  class="m-0! h-[186px]! w-[360px]! gap-2.5 border-transparent!">
  <mat-card-header class="header">
    <div class="flex flex-row items-center">
      <img
        mat-card-image
        src="{{ organization.logo }}"
        class="mr-4 size-10 rounded-full!" />
      <mat-card-title
        class="m-0 line-clamp-1 overflow-hidden text-lg! font-medium!"
        [matTooltip]="organization.name"
        matTooltipPosition="above"
        [matTooltipDisabled]="organization.name.length < 25">
        {{
          organization.name.length < 25
            ? organization.name
            : organization.shorthand
        }}
      </mat-card-title>
    </div>
  </mat-card-header>

  <mat-card-content class="grow">
    <p class="m-0 line-clamp-2 w-full overflow-hidden">
      {{ organization.short_description }}
    </p>
  </mat-card-content>

  <mat-card-actions class="flex! flex-row! justify-end">
    <div class="mt-auto mb-2 flex flex-row items-center gap-2">
      @if (organization.website !== '') {
        <social-media-icon [fontIcon]="'link'" [href]="organization.website" />
      }
      <a
        class="mr-0 no-underline"
        [routerLink]="['/organizations', organization.slug]">
        <button mat-flat-button>Details</button>
      </a>
    </div>
  </mat-card-actions>
</mat-card>
