<mat-card class="mat-csxl-search-bar max-w-full!" appearance="outlined">
  <mat-form-field
    class="search-bar-form-field"
    appearance="outline"
    color="accent"
    subscriptSizing="dynamic">
    <input
      matInput
      type="text"
      placeholder="Search"
      [(ngModel)]="searchBarQuery"
      (ngModelChange)="onTextChanged()" />
    <!-- Search/Clear Icon Logic -->
    @if (searchBarQuery) {
    <button
      matSuffix
      mat-icon-button
      aria-label="Clear"
      (click)="clearSearch()">
      <!-- "Clear" appears if there is a search query. -->
      <mat-icon>close</mat-icon>
    </button>
    } @else {
    <!-- "Search" appears if there is no search query. -->
    <mat-icon matSuffix>search</mat-icon>
    }
  </mat-form-field>
</mat-card>
