@if (articlesPage()) {
  <mat-card appearance="outlined" class="mr-8! max-w-full! border-transparent!">
    <mat-card-content>
      <div class="table-responsive">
        <table mat-table [dataSource]="articlesPage()!.items">
          <ng-container matColumnDef="title">
            <th mat-header-cell *matHeaderCellDef>
              <div class="flex items-center justify-between">
                <mat-card-title>Articles</mat-card-title>
                <button mat-stroked-button routerLink="/article/new/edit">
                  Create
                </button>
              </div>
            </th>
            <td
              mat-cell
              *matCellDef="let element"
              class="cursor-pointer border-y-0! hover:rounded-2xl hover:bg-white/10!">
              <div class="flex items-center justify-between">
                <p class="mb-0!">
                  {{ element.title }}
                  <span
                    [class]="
                      'h-[22px] w-8 rounded-full px-[6px] py-0.5 text-center text-[10px] text-white' +
                      (element.state === articleState.DRAFT
                        ? 'secondary-container-background'
                        : element.state === articleState.PUBLISHED
                          ? 'primary-fixed-dim-background'
                          : 'tertiary-container-background')
                    ">
                    {{ element.state }}
                  </span>
                  @if (element.is_announcement) {
                    <span
                      class="primary-container-background ml-4 h-[22px] w-8 rounded-full px-[6px] py-0.5 text-center text-[10px] text-white">
                      Announcement
                    </span>
                  }
                </p>
                <div class="button-container">
                  <button
                    mat-stroked-button
                    (click)="deleteArticle(element)"
                    class="tertiary-button m-1 justify-between">
                    Delete
                  </button>
                  <button
                    mat-stroked-button
                    class="m-1 justify-between"
                    [routerLink]="'/article/' + element.slug + '/edit'">
                    Edit
                  </button>
                  <button
                    mat-flat-button
                    class="m-1 justify-between"
                    [routerLink]="'/article/' + element.slug">
                    View
                  </button>
                </div>
              </div>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
        <mat-paginator
          [length]="articlesPage()!.length"
          [pageSize]="articlesPage()!.params.page_size"
          [pageIndex]="articlesPage()!.params.page"
          (page)="handlePageEvent($event)"></mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
}
