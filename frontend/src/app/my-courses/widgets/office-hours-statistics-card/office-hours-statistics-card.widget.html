<mat-card class="m-0! max-w-max!" appearance="outlined">
  <mat-card-header>
    <mat-card-title class="title-medium">{{ title() }}</mat-card-title>
  </mat-card-header>
  <mat-card-content class="flex! flex-row! items-center! gap-6! pt-3!">
    <p>
      <span
        class="inverse-primary-background-color label-large mr-2 h-8 w-12 rounded-full px-3 py-[6px] text-center leading-8 text-white"
        >{{ leftStatistic() }}</span
      >{{ leftStatisticLabel() }}
    </p>
    @if (rightStatistic() && rightStatisticLabel()) {
      <p>
        <span
          class="surface-container-high label-large mr-2 h-8 w-12 rounded-full px-3 py-[6px] text-center leading-8 text-white"
          >{{ rightStatistic() }}</span
        >{{ rightStatisticLabel() }}
      </p>
    }
  </mat-card-content>
</mat-card>
