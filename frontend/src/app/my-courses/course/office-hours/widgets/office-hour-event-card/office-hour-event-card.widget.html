<mat-card class="m-0! max-w-[400px]!" appearance="outlined">
  <mat-card-header
    class="flex! w-full! flex-row! items-center! justify-between!">
    <mat-card-subtitle>{{ event.type }}</mat-card-subtitle>
    <mat-chip-set class="ml-auto! h-6!">
      <mat-chip class="m-0! h-6!">{{ event.queued }} waiting</mat-chip>
    </mat-chip-set>
  </mat-card-header>
  <mat-card-content class="pt-3!">
    <p>
      {{ event.start_time | date: 'shortTime' }} -
      {{ event.end_time | date: 'shortTime' }}
    </p>
    <p>{{ event.location }}</p>
    <p>{{ event.description }}</p>
  </mat-card-content>
  <mat-card-actions class="flex! flex-row! justify-end! gap-2! py-4!">
    @if ((role$ | async) !== 'Student') {
      <button mat-stroked-button color="secondary" [routerLink]="editRoute">
        Edit
      </button>
    }
    <button
      mat-flat-button
      color="primary"
      type="submit"
      [routerLink]="
        event.id + ((role$ | async) === 'Student' ? '/get-help' : '/queue')
      ">
      {{ (role$ | async) === 'Student' ? 'Get Help' : 'Check In' }}
    </button>
  </mat-card-actions>
</mat-card>
