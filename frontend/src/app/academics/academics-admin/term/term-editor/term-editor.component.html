<!-- Update Term Form -->
<form [formGroup]="termForm" (ngSubmit)="onSubmit()">
  <!-- Update Term Card -->
  <mat-pane appearance="outlined">
    <mat-card-header>
      @if (this.termId === 'new') {
      <mat-card-title> Create Term </mat-card-title>
      } @else {
      <mat-card-title> Update Term </mat-card-title>
      }
    </mat-card-header>
    <mat-card-content class="flex! flex-col! gap-3! pt-4!">
      <!-- Term ID Field -->
      @if (termId === 'new') {
      <mat-form-field class="w-full" appearance="outline" color="accent">
        <mat-label>Term ID</mat-label>
        <input
          matInput
          placeholder=""
          formControlName="id"
          name="id"
          required />
      </mat-form-field>
      }
      <!-- Term Name Field -->
      <mat-form-field appearance="outline" color="accent" class="w-full">
        <mat-label>Term Name</mat-label>
        <input
          matInput
          placeholder=""
          formControlName="name"
          name="name"
          required />
      </mat-form-field>
      <!-- Term Start Field -->
      <mat-form-field appearance="outline" color="accent" class="w-full">
        <mat-label>Term Start Date</mat-label>
        <input
          matInput
          type="datetime-local"
          placeholder="Start Date"
          formControlName="start"
          name="start"
          required />
      </mat-form-field>
      <!-- Term End Field -->
      <mat-form-field appearance="outline" color="accent" class="w-full">
        <mat-label>Term End Date</mat-label>
        <input
          matInput
          type="datetime-local"
          placeholder="End Date"
          formControlName="end"
          name="end"
          required />
      </mat-form-field>
      <!-- Term Applications Open Field -->
      <mat-form-field appearance="outline" color="accent" class="w-full">
        <mat-label>Term Applications Open Date</mat-label>
        <input
          matInput
          type="datetime-local"
          placeholder="Start Date"
          formControlName="applications_open"
          name="applications_open"
          required />
      </mat-form-field>
      <!-- Term Applications Close Field -->
      <mat-form-field appearance="outline" color="accent" class="w-full">
        <mat-label>Term Applications Close Date</mat-label>
        <input
          matInput
          type="datetime-local"
          placeholder="End Date"
          formControlName="applications_close"
          name="applications_close"
          required />
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions class="mb-2! flex! flex-row! justify-end!">
      <div class="flex flex-row gap-2">
        <button mat-stroked-button routerLink="/academics/admin/term">
          Cancel
        </button>
        <button mat-flat-button type="submit" [disabled]="termForm.invalid">
          Save
        </button>
      </div>
    </mat-card-actions>
  </mat-pane>
</form>
